<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agent-lecture</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').style.cssText = 'padding:40px;font-family:monospace;background:#111;color:#f88;white-space:pre-wrap;font-size:13px';
        document.getElementById('root').textContent = '💥 JS Error\n' + msg + '\n' + src + ':' + line + ':' + col + '\n\n' + (err ? err.stack : '');
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').style.cssText = 'padding:40px;font-family:monospace;background:#111;color:#f88;white-space:pre-wrap;font-size:13px';
        document.getElementById('root').textContent = '💥 Promise Rejection\n' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)) + '\n\n' + (e.reason && e.reason.stack ? e.reason.stack : '');
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
